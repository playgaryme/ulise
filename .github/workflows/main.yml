name: iiyyo - Twitch Viewer (Brave + WARP)

on:
  schedule:
    - cron: "*/5 * * * *"          # Every 5 minutes
  workflow_dispatch:               # Manual trigger
    branches: [main]               # Add your default branch if needed

jobs:
  run-viewer:
    name: Run Viewer Session
    env:
      PY_COLORS: "1"
      LANG: "en_US.UTF-8"
      LC_ALL: "en_US.UTF-8"

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.13"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # ====================== NETWORK (WARP) ======================
      - name: Install & Connect Cloudflare WARP
        run: |
          set -e
          echo "🔧 Setting up Cloudflare WARP..."
          sudo apt-get update -y
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update && sudo apt-get install -y --no-install-recommends cloudflare-warp
          sudo warp-cli --accept-tos registration new
          sudo warp-cli --accept-tos mode warp+doh
          sudo warp-cli --accept-tos connect
          sleep 8
          echo "✅ WARP connected"
        shell: bash

      - name: Verify WARP connection
        run: |
          echo "🌐 Checking WARP status..."
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -q "warp=on" || { echo "❌ WARP not connected!"; exit 1; }
          echo "✅ WARP active"
        shell: bash

      # ====================== LOCALE & SYSTEM ======================
      - name: Set Locale (en_US.UTF-8)
        run: |
          sudo apt-get install -y tzdata locales
          sudo locale-gen en_US.UTF-8
          sudo update-locale LANG=en_US.UTF-8 LC_ALL=en_US.UTF-8
          echo "✅ Locale set"
          locale
        shell: bash

      # ====================== BRAVE BROWSER (NEW) ======================
      - name: Install Brave Browser (official 2026 repo)
        run: |
          set -e
          echo "🦁 Installing Brave Browser..."
          sudo apt-get install -y curl
          sudo curl -fsSLo /usr/share/keyrings/brave-browser-archive-keyring.gpg https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
          sudo curl -fsSLo /etc/apt/sources.list.d/brave-browser-release.sources https://brave-browser-apt-release.s3.brave.com/brave-browser.sources
          sudo apt-get update
          sudo apt-get install -y brave-browser
          echo "✅ Brave installed: $(brave-browser --version)"
        shell: bash

      # ====================== PYTHON & SELENIUMBASE ======================
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install --upgrade seleniumbase pyautogui pymongo python-xlib
          echo "✅ Dependencies installed"
        shell: bash

      - name: Install SeleniumBase drivers
        run: |
          seleniumbase install chromedriver
          echo "✅ Drivers ready (Brave uses system browser)"
        shell: bash

      # ====================== RUN VIEWER ======================
      - name: Run yoy.py (Brave + Undetectable + WARP)
        run: |
          echo "🚀 Starting viewer session with Brave..."
          python yoy.py \
            --brave \
            --incognito \
            --do-not-track \
            --xvfb \
            --screenshot \
            --debug
          echo "✅ Session completed"
        shell: bash
